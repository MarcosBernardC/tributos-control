<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Tributos - SUNAT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-container" class="login-wrapper">
        <div class="login-card fade-in">
            <div class="login-header">
                <div class="icon-wrapper bg-blue mx-auto mb-4">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h2>Acceso Seguro</h2>
                <p>Control de Pagos SUNAT</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <label for="ruc">RUC de la empresa</label>
                    <input type="text" id="ruc" placeholder="20123456789" required autofocus>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña de acceso</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn primary full-width justify-center mt-4">
                    Ingresar al Dashboard
                </button>
            </form>
        </div>
    </div>

    <!-- Dashboard Content (hidden by default) -->
    <div id="dashboard-container" class="dashboard-container d-none">
        <header class="dashboard-header">
            <div class="header-titles">
                <h1>Control de Alquileres</h1>
                <p>Dashboard Financiero y Tributario</p>
            </div>
            <div class="header-actions">
                <button id="privacy-btn" class="btn secondary mr-2">
                    <svg id="privacy-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                    <span>Modo Privado</span>
                </button>
                <button id="refresh-btn" class="btn primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path>
                        <path d="M16 21v-5h5"></path>
                    </svg>
                    Actualizar Datos
                </button>
            </div>
        </header>

        <main class="dashboard-layout">
            
            <!-- ROW 1: KPI Summary -->
            <section class="kpi-grid fade-in" id="kpi-container">
                <!-- KPI cards will be generated by JS -->
            </section>
            
            <!-- ROW 2: Primary Focus (Tenants) -->
            <section class="card inquilinos-card fade-in" style="animation-delay: 0.1s">
                <div class="card-header flex-between">
                    <div>
                        <h2>Estado de Inquilinos</h2>
                        <p class="subtitle">Ingresos del mes en curso</p>
                    </div>
                    <div class="legend">
                        <span class="badge pendiente">Pendiente</span>
                        <span class="badge pagado">Pagado</span>
                    </div>
                </div>
                <div class="card-body bg-light-gray">
                    <div class="inquilinos-grid" id="inquilinos-grid">
                        <!-- Generated by JS -->
                    </div>
                </div>
            </section>

            <!-- ROW 3: Secondary Info (Owner, SUNAT, Schedule) -->
            <div class="dashboard-secondary-grid mt-4 fade-in" style="animation-delay: 0.2s">
                <!-- Owner Info -->
                <section class="card summary-card fade-in">
                    <div class="card-header border-none">
                        <div class="flex items-center gap-2">
                            <div class="icon-wrapper bg-blue small-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            </div>
                            <h2 class="text-md">Propietario</h2>
                        </div>
                    </div>
                    <div class="card-body pt-0 pb-3" id="propietario-info">
                        <div class="skeleton-text"></div>
                    </div>
                </section>

                <!-- Tax Config -->
                <section class="card summary-card fade-in" style="animation-delay: 0.1s">
                    <div class="card-header border-none">
                        <div class="flex items-center gap-2">
                            <div class="icon-wrapper bg-purple small-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                            </div>
                            <h2 class="text-md">Obligaciones Tributarias</h2>
                        </div>
                    </div>
                    <div class="card-body pt-0 pb-3" id="config-info">
                        <div class="skeleton-text"></div>
                    </div>
                </section>
                
                <!-- Schedule card -->
                <section class="card cronograma-card cronograma-span fade-in" style="animation-delay: 0.3s">
                    <div class="card-header py-3">
                        <h2 class="text-md">Cronograma SUNAT 2026</h2>
                    </div>
                    <div class="card-body p-0 max-h-schedule overflow-y-auto">
                        <div class="table-container">
                            <table id="cronograma-table" class="small-table">
                                <thead>
                                    <tr>
                                        <th>Periodo</th>
                                        <th>Vencimiento</th>
                                        <th>Estado</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Generated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="js/main.js"></script>
</body>
</html>
